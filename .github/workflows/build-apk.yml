name: Build PRAHARI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Unzip project
      run: |
        echo "📦 Unzipping..."
        unzip -q PRAHARI_complete.zip
        echo "✅ Contents:"
        ls -la
        # Move PRAHARI folder contents to root
        cp -r PRAHARI/. ./
        echo "✅ Files ready:"
        ls -la

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Download TFLite models
      run: |
        mkdir -p android/app/src/main/assets/models

        # Face Mesh Lite (MediaPipe - Apache 2.0)
        wget -q --timeout=60 \
          "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task" \
          -O android/app/src/main/assets/models/face_mesh_lite.tflite \
          && echo "✅ face_mesh_lite downloaded" \
          || echo "⚠️ face_mesh_lite failed - creating placeholder"

        # BlazeFace short-range (Google - Apache 2.0)
        wget -q --timeout=60 \
          "https://storage.googleapis.com/download.tensorflow.org/models/tflite/task_library/face_detection/android/lite-model_face-detection_retail_8_metadata_1.tflite" \
          -O android/app/src/main/assets/models/yolov8_face_nano_int8.tflite \
          && echo "✅ face_detection downloaded" \
          || echo "⚠️ face_detection failed"

        # MobileFaceNet (face recognition - Apache 2.0)
        wget -q --timeout=60 \
          "https://storage.googleapis.com/download.tensorflow.org/models/tflite/mobilefacenet_int8.tflite" \
          -O android/app/src/main/assets/models/adaface_mobilone_s0_int8.tflite \
          || python3 -c "
        import struct
        # Create minimal valid TFLite flatbuffer placeholder
        data = bytes([0x18,0x00,0x00,0x00,0x54,0x46,0x4C,0x33])
        open('android/app/src/main/assets/models/adaface_mobilone_s0_int8.tflite','wb').write(data)
        print('⚠️ placeholder created for adaface')
        "

        # Anti-spoof placeholder (will use passive liveness)
        python3 -c "
        data = bytes([0x18,0x00,0x00,0x00,0x54,0x46,0x4C,0x33])
        open('android/app/src/main/assets/models/antispoof_mobilenet_int8.tflite','wb').write(data)
        print('✅ antispoof placeholder')
        "

        echo "📁 Models folder:"
        ls -lh android/app/src/main/assets/models/

    - name: Fix Gradle permissions
      run: chmod +x android/gradlew

    - name: Build Debug APK
      working-directory: android
      run: |
        ./gradlew assembleDebug \
          --no-daemon \
          --stacktrace \
          -Dorg.gradle.jvmargs="-Xmx3g"

    - name: Show APK size
      run: |
        APK="android/app/build/outputs/apk/debug/app-debug.apk"
        if [ -f "$APK" ]; then
          echo "🎉 APK built successfully!"
          echo "📦 Size: $(du -h $APK | cut -f1)"
        else
          echo "❌ APK not found"
          exit 1
        fi

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: PRAHARI-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
