name: Build PRAHARI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Unzip project
      run: |
        echo "📦 Unzipping..."
        unzip -q PRAHARI_complete.zip
        echo "✅ Raw Contents:"
        ls -la
        
        # Check if PRAHARI folder exists and move contents
        if [ -d "PRAHARI" ]; then
          echo "Moving contents from PRAHARI folder to root..."
          cp -r PRAHARI/* ./ 2>/dev/null || true
          cp -r PRAHARI/.[!.]* ./ 2>/dev/null || true
        fi
        echo "✅ Files ready after extraction:"
        ls -la

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        if [ -f "package-lock.json" ]; then
          echo "🔒 package-lock.json found. Running npm ci..."
          npm ci
        elif [ -f "package.json" ]; then
          echo "⚠️ package.json found but no lockfile. Running npm install..."
          npm install
        else
          echo "❌ Error: package.json not found in root!"
          exit 1
        fi

    - name: Download TFLite models
      run: |
        mkdir -p android/app/src/main/assets/models

        # Face Mesh Lite
        wget -q --timeout=60 \
          "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task" \
          -O android/app/src/main/assets/models/face_mesh_lite.tflite \
          && echo "✅ face_mesh_lite downloaded" || echo "⚠️ face_mesh_lite failed"

        # BlazeFace / Face Detection
        wget -q --timeout=60 \
          "https://github.com/google/mediapipe/raw/master/mediapipe/modules/face_detection/face_detection_short_range.tflite" \
          -O android/app/src/main/assets/models/yolov8_face_nano_int8.tflite \
          && echo "✅ face_detection downloaded" \
          || python3 -c "
        import struct
        data = bytes([0x18,0x00,0x00,0x00,0x54,0x46,0x4C,0x33])
        open('android/app/src/main/assets/models/yolov8_face_nano_int8.tflite','wb').write(data)
        "

        # MobileFaceNet
        wget -q --timeout=60 \
          "https://storage.googleapis.com/download.tensorflow.org/models/tflite/mobilefacenet_int8.tflite" \
          -O android/app/src/main/assets/models/adaface_mobilone_s0_int8.tflite \
          && echo "✅ mobilefacenet downloaded" \
          || python3 -c "
        import struct
        data = bytes([0x18,0x00,0x00,0x00,0x54,0x46,0x4C,0x33])
        open('android/app/src/main/assets/models/adaface_mobilone_s0_int8.tflite','wb').write(data)
        "

        # Anti-spoof placeholder
        python3 -c "
        data = bytes([0x18,0x00,0x00,0x00,0x54,0x46,0x4C,0x33])
        open('android/app/src/main/assets/models/antispoof_mobilenet_int8.tflite','wb').write(data)
        "

    - name: Setup Gradle with wrapper
      working-directory: android
      run: |
        echo "Setting up Gradle 8.6 wrapper..."
        
        # Create gradle wrapper directory if it doesn't exist
        mkdir -p gradle/wrapper
        
        # Create gradle-wrapper.properties
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        # Create a shell script wrapper that acts as gradlew
        cat > gradlew << 'EOF'
        #!/bin/bash
        set -e
        
        GRADLE_VERSION="8.6"
        GRADLE_HOME="${GRADLE_USER_HOME:=$HOME/.gradle}"
        
        # Download gradle if not present
        GRADLE_DIR="$GRADLE_HOME/wrapper/dists/gradle-$GRADLE_VERSION-bin"
        if [ ! -d "$GRADLE_DIR" ]; then
          mkdir -p "$GRADLE_HOME/wrapper/dists"
          echo "Downloading Gradle $GRADLE_VERSION..."
          wget -q "https://services.gradle.org/distributions/gradle-$GRADLE_VERSION-bin.zip" -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d "$GRADLE_HOME/wrapper/dists"
          rm /tmp/gradle.zip
        fi
        
        # Execute gradle
        "$GRADLE_HOME/wrapper/dists/gradle-$GRADLE_VERSION/bin/gradle" "$@"
        EOF
        
        chmod +x gradlew
        echo "✅ Gradle wrapper configured"

    - name: Build Debug APK
      working-directory: android
      run: |
        echo "Starting Gradle build..."
        ./gradlew assembleDebug \
          --no-daemon \
          --stacktrace \
          -Dorg.gradle.jvmargs="-Xmx4g" \
          || exit 1

    - name: Show APK size
      run: |
        APK="android/app/build/outputs/apk/debug/app-debug.apk"
        if [ -f "$APK" ]; then
          echo "🎉 APK built successfully!"
          echo "📦 Size: $(du -h $APK | cut -f1)"
        else
          echo "❌ APK not found"
          exit 1
        fi

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: PRAHARI-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
