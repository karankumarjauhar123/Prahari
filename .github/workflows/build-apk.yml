name: Build PRAHARI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Debug - Check what's in zip
      run: |
        echo "📋 Listing zip contents (first 50 entries):"
        unzip -l PRAHARI_complete.zip | head -50

    - name: Unzip project
      run: |
        echo "📦 Unzipping PRAHARI_complete.zip..."
        unzip -q PRAHARI_complete.zip
        
        echo "📋 Root contents after unzip:"
        ls -la
        
        # Find where android folder is
        if [ -d "PRAHARI/android" ]; then
          echo "✅ Found PRAHARI/android"
          cp -r PRAHARI/* ./
          cp -r PRAHARI/.[!.]* ./
        elif [ -d "android" ]; then
          echo "✅ Found android in root"
        else
          echo "❌ Android folder not found!"
          find . -name "android" -type d 2>/dev/null | head -5
          exit 1
        fi
        
        echo "📋 Files after extraction:"
        ls -la
        echo "📋 Android folder contents:"
        ls -la android/

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        if [ -f "package-lock.json" ]; then
          echo "🔒 package-lock.json found. Running npm ci..."
          npm ci
        elif [ -f "package.json" ]; then
          echo "⚠️ package.json found but no lockfile. Running npm install..."
          npm install --legacy-peer-deps
        else
          echo "❌ Error: package.json not found in root!"
          exit 1
        fi

    - name: Download TFLite models
      run: |
        mkdir -p android/app/src/main/assets/models

        echo "⏳ Downloading Face Mesh Lite..."
        wget -q --timeout=60 \
          "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task" \
          -O android/app/src/main/assets/models/face_mesh_lite.tflite \
          && echo "✅ face_mesh_lite downloaded" || echo "⚠️ face_mesh_lite failed"

        echo "⏳ Downloading BlazeFace..."
        wget -q --timeout=60 \
          "https://github.com/google/mediapipe/raw/master/mediapipe/modules/face_detection/face_detection_short_range.tflite" \
          -O android/app/src/main/assets/models/yolov8_face_nano_int8.tflite \
          && echo "✅ face_detection downloaded" \
          || python3 -c "
        data = bytes([0x18,0x00,0x00,0x00,0x54,0x46,0x4C,0x33])
        open('android/app/src/main/assets/models/yolov8_face_nano_int8.tflite','wb').write(data)
        "

        echo "⏳ Downloading MobileFaceNet..."
        wget -q --timeout=60 \
          "https://storage.googleapis.com/download.tensorflow.org/models/tflite/mobilefacenet_int8.tflite" \
          -O android/app/src/main/assets/models/adaface_mobilone_s0_int8.tflite \
          && echo "✅ mobilefacenet downloaded" \
          || python3 -c "
        data = bytes([0x18,0x00,0x00,0x00,0x54,0x46,0x4C,0x33])
        open('android/app/src/main/assets/models/adaface_mobilone_s0_int8.tflite','wb').write(data)
        "

        echo "Creating anti-spoof placeholder..."
        python3 -c "
        data = bytes([0x18,0x00,0x00,0x00,0x54,0x46,0x4C,0x33])
        open('android/app/src/main/assets/models/antispoof_mobilenet_int8.tflite','wb').write(data)
        "
        echo "✅ All models ready"

    - name: Create Gradle wrapper if missing
      working-directory: android
      run: |
        echo "🔍 Checking for gradlew..."
        
        if [ -f "gradlew" ]; then
          echo "✅ gradlew found"
          chmod +x gradlew
        else
          echo "⚠️ gradlew NOT found - creating from scratch"
          
          # Download standalone gradle and create wrapper
          echo "Downloading Gradle 8.6..."
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          
          echo "Extracting Gradle..."
          unzip -q /tmp/gradle.zip -d /tmp/
          
          # Create gradle wrapper structure
          mkdir -p gradle/wrapper
          
          # Copy gradle-wrapper.jar from downloaded gradle
          cp /tmp/gradle-8.6/lib/plugins/gradle-wrapper-*.jar gradle/wrapper/gradle-wrapper.jar 2>/dev/null || true
          
          # Create gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        PROPS
          
          # Create gradlew script
          cat > gradlew << 'SCRIPT'
        #!/bin/sh
        APP_NAME="Gradle"
        APP_HOME=$( cd "${0%/*}" && pwd -P )
        APP_JAR="${APP_HOME}/gradle/wrapper/gradle-wrapper.jar"
        
        if [ ! -f "$APP_JAR" ]; then
          echo "Downloading Gradle wrapper jar..."
          mkdir -p "${APP_HOME}/gradle/wrapper"
          wget -q https://github.com/gradle/gradle/raw/master/gradle/wrapper/gradle-wrapper.jar -O "$APP_JAR"
        fi
        
        exec java -jar "$APP_JAR" "$@"
        SCRIPT
          
          chmod +x gradlew
          echo "✅ gradlew created"
          
          # Cleanup
          rm -f /tmp/gradle.zip
          rm -rf /tmp/gradle-8.6
        fi
        
        ls -la gradlew
        ./gradlew --version || echo "⚠️ Gradle version check skipped"

    - name: Build Debug APK
      working-directory: android
      run: |
        echo "🚀 Starting APK build..."
        ./gradlew assembleDebug \
          --no-daemon \
          -Dorg.gradle.jvmargs="-Xmx4g" \
          -Dorg.gradle.warning.mode=all

    - name: Check APK
      run: |
        APK="android/app/build/outputs/apk/debug/app-debug.apk"
        if [ -f "$APK" ]; then
          echo "🎉 APK built successfully!"
          echo "📦 APK Size: $(du -h "$APK" | cut -f1)"
          ls -lh "$APK"
        else
          echo "❌ APK not found at $APK"
          echo "📋 Looking for APK files..."
          find android -name "*.apk" 2>/dev/null || echo "No APK files found"
          exit 1
        fi

    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: PRAHARI-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
