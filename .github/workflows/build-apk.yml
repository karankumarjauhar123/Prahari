name: Build PRAHARI APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Unzip project
      run: |
        echo "📦 Unzipping..."
        unzip -q PRAHARI_complete.zip
        echo "✅ Raw Contents:"
        ls -la
        
        # Check if PRAHARI folder exists and move contents
        if [ -d "PRAHARI" ]; then
          echo "Moving contents from PRAHARI folder to root..."
          cp -r PRAHARI/* ./ 2>/dev/null || true
          cp -r PRAHARI/.[!.]* ./ 2>/dev/null || true
        fi
        echo "✅ Files ready after extraction:"
        ls -la

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        if [ -f "package-lock.json" ]; then
          echo "🔒 package-lock.json found. Running npm ci..."
          npm ci
        elif [ -f "package.json" ]; then
          echo "⚠️ package.json found but no lockfile. Running npm install..."
          npm install
        else
          echo "❌ Error: package.json not found in root!"
          exit 1
        fi

    - name: Download TFLite models
      run: |
        mkdir -p android/app/src/main/assets/models

        # Face Mesh Lite
        wget -q --timeout=60 \
          "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/latest/face_landmarker.task" \
          -O android/app/src/main/assets/models/face_mesh_lite.tflite || echo "⚠️ face_mesh_lite failed"

        # BlazeFace
        wget -q --timeout=60 \
          "https://storage.googleapis.com/download.tensorflow.org/models/tflite/task_library/face_detection/android/lite-model_face-detection_retail_8_metadata_1.tflite" \
          -O android/app/src/main/assets/models/yolov8_face_nano_int8.tflite || echo "⚠️ face_detection failed"

        # MobileFaceNet
        wget -q --timeout=60 \
          "https://storage.googleapis.com/download.tensorflow.org/models/tflite/mobilefacenet_int8.tflite" \
          -O android/app/src/main/assets/models/adaface_mobilone_s0_int8.tflite \
          || python3 -c "
        import struct
        data = bytes([0x18,0x00,0x00,0x00,0x54,0x46,0x4C,0x33])
        open('android/app/src/main/assets/models/adaface_mobilone_s0_int8.tflite','wb').write(data)
        "

        # Anti-spoof placeholder
        python3 -c "
        data = bytes([0x18,0x00,0x00,0x00,0x54,0x46,0x4C,0x33])
        open('android/app/src/main/assets/models/antispoof_mobilenet_int8.tflite','wb').write(data)
        "

    - name: Setup Correct Gradle Version (8.6)
      working-directory: android
      run: |
        if [ ! -f "gradlew" ]; then
          echo "⚠️ gradlew missing! Downloading standalone Gradle 8.6..."
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
          sudo unzip -q gradle-8.6-bin.zip -d /opt
          export PATH=/opt/gradle-8.6/bin:$PATH
          
          echo "Generating modern gradlew files..."
          gradle wrapper --gradle-version 8.6 --distribution-type all
        else
          echo "✅ Valid gradlew found in zip."
        fi
        chmod +x gradlew

    - name: Build Debug APK
      working-directory: android
      run: |
        ./gradlew assembleDebug \
          --no-daemon \
          --stacktrace \
          -Dorg.gradle.jvmargs="-Xmx4g"

    - name: Show APK size
      run: |
        APK="android/app/build/outputs/apk/debug/app-debug.apk"
        if [ -f "$APK" ]; then
          echo "🎉 APK built successfully!"
          echo "📦 Size: $(du -h $APK | cut -f1)"
        else
          echo "❌ APK not found"
          exit 1
        fi

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: PRAHARI-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
