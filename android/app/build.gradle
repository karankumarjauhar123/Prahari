// android/app/build.gradle
apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "kotlin-android"

react {
    /* Autolinking & Hermes */
    hermesEnabled = true
    entryFile = file("../../index.js")
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.prahari"
    defaultConfig {
        applicationId "com.prahari"
        minSdkVersion rootProject.ext.minSdkVersion       // Android 8.0+
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
        resConfigs "en"

        // Required for SQLCipher encryption
        ndk {
            // Hackathon: arm64-v8a only — all modern devices are 64-bit
            abiFilters "arm64-v8a"
        }
    }

    // CRITICAL: Prevent tflite files from being compressed
    // If compressed, models will fail to load at runtime (mmap requires uncompressed)
    aaptOptions {
        noCompress "tflite"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // Replace with your release keystore
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
            // Hackathon: use debug keystore for signing
            signingConfig signingConfigs.debug
        }
    }

    packaging {
        jniLibs {
            // false = compress .so libs in APK (saves ~2-3 MB)
            // Safe for minSdk 26+ (Android 8.0+)
            useLegacyPackaging false
        }
        resources {
            pickFirsts += ['**/libc++_shared.so', '**/libfbjni.so']
            excludes += [
                'META-INF/AL2.0',
                'META-INF/LGPL2.1',
                'META-INF/LICENSE*',
                'META-INF/NOTICE*',
                'META-INF/*.kotlin_module',
                'META-INF/DEPENDENCIES',
                'META-INF/INDEX.LIST',
                'META-INF/io.netty.*',
                'META-INF/versions/**',
                'DebugProbesKt.bin',
                'kotlin/**',
                'kotlin-tooling-metadata.json',
            ]
        }
    }
}

configurations.all {
    resolutionStrategy {
        force 'androidx.core:core:1.12.0'
        force 'androidx.core:core-ktx:1.12.0'
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // NOTE: TFLite is provided by react-native-fast-tflite — do NOT add native TFLite deps here

    // Kotlin
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlinVersion"
}

// ProGuard rules for TFLite
// Keep TFLite classes from being stripped

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)

